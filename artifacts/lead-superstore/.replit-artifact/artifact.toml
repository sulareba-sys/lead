kind = "web"
previewPath = "/"
title = "Lead Superstore"
version = "1.0.0"
id = "artifacts/lead-superstore"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18247

[services.development]
run = "pnpm --filter @workspace/lead-superstore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lead-superstore", "run", "build" ]
publicDir = "artifacts/lead-superstore/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18247"
BASE_PATH = "/"
